<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp</title>
    <link rel="stylesheet" href="style.css">

    
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="phone">

  
    <div class="header">

        <div class="left">
            <i class="fa fa-arrow-left"></i>
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Virat_Kohli.jpg" class="dp">
            <span>Virat Kohli</span>
        </div>

        
        <div class="right">
            <i class="fa fa-video"></i>
            <i class="fa fa-phone"></i>
            <i class="fa-solid fa-ellipsis-vertical"></i> <!-- 3 vertical dots -->
        </div>

    </div>

    
    <div class="chat">

        <div class="date">26-01-2024</div>

        <div class="msg sent">Hey Virat!</div>
        <div class="msg sent">Big fan of yours 🔥</div>
        <div class="msg sent">How do you stay focused?</div>

        <div class="msg received">Hey Pavitra!</div>
        <div class="msg received">Thanks, man! 👏</div>
        <div class="msg received">Discipline & mindset 💪</div>

        <div class="date">27-01-2024</div>

        <div class="msg sent">Any advice for consistency?</div>
        <div class="msg sent">I struggle sometimes 😅</div>

        <div class="msg received">Start small 👍</div>
        <div class="msg received">Set goals 🎯</div>

        <div class="date">28-01-2024</div>

        <div class="msg sent">What about fitness?</div>
        <div class="msg received">Very important 💯</div>
        <div class="msg received">Workout daily</div>

    </div>

  
    <div class="footer">
        <i class="fa fa-smile"></i>
        <input type="text" placeholder="Message">
        <i class="fa fa-paperclip"></i>
        <i class="fa fa-camera"></i>

        
        <div class="mic">
            <i class="fa fa-microphone"></i>
        </div>
    </div>

</div>

</body>
</html>
